<mat-sidenav-container fullscreen>

  <mat-sidenav #sidenav mode="push" [ngStyle]="{ width: '300px','background-color': 'var(--mat-sys-primary)' }">

    <mat-toolbar class="toolbar-primary">
      <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800;">MOVIETECA</span>
    </mat-toolbar>

    <mat-nav-list class="p-3">
      @for(item of sidebarItems; track $index){
        <mat-list-item [routerLink]=item.url (click)="sidenav.toggle()" class="mt-2">
          <mat-icon matListItemIcon style="color:white">{{item.icon}}</mat-icon>
          <span matListItemTitle style="color:white">{{item.label}}</span>
        </mat-list-item>
      }
    </mat-nav-list>

  </mat-sidenav>

  <mat-toolbar class="toolbar-warn">

    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon style="color:white">menu</mat-icon>
    </button>

    <span class="spacer"></span>

    <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
      <mat-icon>account_circle</mat-icon>
      <span>{{ user?.nombre_publico }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
    </mat-menu>

  </mat-toolbar>

  <router-outlet></router-outlet>

</mat-sidenav-container>
