<mat-sidenav-container fullscreen>

  <mat-sidenav #sidenav mode="push" [ngStyle]="{ width: '250px' }">

    <mat-toolbar class="toolbar-warn">
      <span>Movieteca</span>
    </mat-toolbar>

    <mat-nav-list>
      @for(item of sidebarItems; track $index){
        <mat-list-item [routerLink]=item.url (click)="sidenav.toggle()">
          <mat-icon matListItemIcon>{{item.icon}}</mat-icon>
          {{item.label}}
        </mat-list-item>
      }
    </mat-nav-list>

  </mat-sidenav>

  <mat-toolbar class="toolbar-primary">

    <button mat-icon-button (click)="sidenav.toggle()">
      <img src="movieteca_white.png">
    </button>

    <span class="spacer"></span>

    <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
      <mat-icon>account_circle</mat-icon>
      <span>{{ user?.nombre_publico }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
    </mat-menu>

  </mat-toolbar>

  <div class="p-2 min-vh-100 w-100" style="background-image: url('bg.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment: fixed;">
    <router-outlet></router-outlet>
  </div>

</mat-sidenav-container>
